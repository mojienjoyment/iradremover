name: Build Eitaa Module APK

on:
  workflow_dispatch: # Allows you to manually click a button to run it
  push:
    branches: [ main ] # Automatically runs when you push code to main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        # We build the debug version to avoid keystore/signing errors
        run: ./gradlew assembleDebug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Eitaa-Ad-Remover-APK
          # This is the standard path where Android Studio/GitHub puts the debug APK
          path: app/build/outputs/apk/debug/app-debug.apk
